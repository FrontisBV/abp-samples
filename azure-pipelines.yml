# Build pipeline for BasicAspNetCoreApplication (first ABP sample)
# This pipeline performs NuGet restore and build for the first ABP project

trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '8.x'
    
- task: DotNetCoreCLI@2
  displayName: 'NuGet Restore - BasicAspNetCoreApplication'
  inputs:
    command: 'restore'
    projects: 'BasicAspNetCoreApplication/BasicAspNetCoreApplication.sln'
    
- task: DotNetCoreCLI@2
  displayName: 'Build - BasicAspNetCoreApplication'
  inputs:
    command: 'build'
    projects: 'BasicAspNetCoreApplication/BasicAspNetCoreApplication.sln'
    arguments: '--configuration Release --no-restore'
